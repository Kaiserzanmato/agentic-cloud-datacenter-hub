<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aethel Global — AI, Cloud & Data Center Infrastructure Intelligence Platform</title>
    <meta name="description" content="AI-powered research & intelligence platform analyzing global AI compute, hyperscale cloud regions, SMR nuclear power agreements, 249 ISO country registries, and direct-to-chip liquid cooling." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      // Applied synchronously, before paint, to avoid a flash of the wrong theme.
      // Default stays 'dark' when nothing is stored, matching the app's original look.
      (function () {
        try {
          var stored = window.localStorage.getItem('aethel-theme');
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'dark';
          var resolved =
            mode === 'system'
              ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : mode;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
          document.documentElement.dataset.theme = resolved;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
